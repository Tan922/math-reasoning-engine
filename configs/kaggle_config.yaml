# ─── MRE Kaggle / Local Configuration ────────────────────────────────────────
# All runtime parameters live here.  Switch environment by changing `env`.

env: kaggle          # kaggle | local

# ─── Hardware ─────────────────────────────────────────────────────────────────
hardware:
  device: auto       # auto | cpu | cuda
  fp16: true         # use half-precision when CUDA is available
  dataloader_workers: 2

# ─── Knowledge Graph ──────────────────────────────────────────────────────────
knowledge_graph:
  max_entities: 3000          # increase to 10000+ for production
  embed_dim: 64
  hidden_dim: 128
  noise_std: 0.05
  data_dir: data/mathkg
  # Kaggle: try XML dump → API → synthetic, in that order
  proofwiki_dump_url: "https://proofwiki.org/xmldump/latest.xml.gz"
  local_dump_path: "/kaggle/input/proofwiki-dump/latest.xml.gz"
  confidence_threshold: 0.65
  min_entity_degree: 1

# ─── NRO Model ────────────────────────────────────────────────────────────────
nro:
  embed_dim: 64
  hidden_dim: 128
  base_relations:
    - depends_on
    - generalizes
    - equivalent_to
    - applied_in
  train_epochs: 60
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  batch_size: 128
  compose_init_steps: 500
  compose_init_lr: 1.0e-3
  finetune_epochs: 40
  finetune_lr: 5.0e-4

# ─── Experiment ───────────────────────────────────────────────────────────────
experiment:
  seed: 42
  n_trials: 5
  k_shots: [1, 5, 10, 25, 50, 100, full]
  composite_relation: gen_dep
  composite_chain: [generalizes, depends_on]
  hits_k: 10

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: INFO
  save_checkpoints: true
  checkpoint_dir: data/checkpoints
  results_dir: data/results
